name: "feat: 新しい機能の実装"
description: 新しい機能の提案・実装リクエスト
labels: ["feat"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 実装したい機能の概要を記述してください
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 動機・背景
      description: なぜこの機能が必要なのかを記述してください
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: 詳細
      description: 期待する動作や仕様を具体的に記述してください
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
      description: 検討した代替案があれば記述してください

name: "perf: パフォーマンス・チューニング"
description: パフォーマンスの改善
labels: ["perf"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: パフォーマンス改善の概要を記述してください
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: 現状
      description: 現在のパフォーマンスの問題点を記述してください
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待する改善
      description: 目標とするパフォーマンスや改善方針を記述してください

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# リリース処理は途中キャンセルしない（タグ作成と資産アップロードの不整合を避ける）。
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # release-plz が「リリース PR」の作成/更新と、PR マージ後のタグ + GitHub Release 作成を担う。
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # リリースが作成されたときだけ、各プラットフォームのバイナリをビルドして Release 資産に添付する。
  # GITHUB_TOKEN で作成した Release はワークフローを連鎖起動しないため、同一ワークフロー内の
  # job 依存（needs / if）でビルドを繋ぐ。
  build:
    name: Build ${{ matrix.target }}
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      # 単一クレートのため release-plz のタグは v<version> 形式。
      # Cargo.toml のバージョン（= バイナリに埋め込まれた版）からタグを導出する。
      - name: Upload binary to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          cp "target/${{ matrix.target }}/release/fv" "fv-${{ matrix.target }}"
          gh release upload "v${version}" "fv-${{ matrix.target }}" --clobber

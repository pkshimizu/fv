name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# リリース処理は途中キャンセルしない（タグ作成と資産アップロードの不整合を避ける）。
concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # release-plz が「リリース PR」の作成/更新と、PR マージ後のタグ + GitHub Release 作成を担う。
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release-plz.outputs.releases_created }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # release-plz が直近のリリースタグ（v0.1.0 等）を認識できるよう、タグも取得する。
          fetch-tags: true

      # release-plz は cargo package（--verify でコンパイル）を実行するため、
      # ビルドに必要なシステム依存（rodio/alsa-sys 用の ALSA）を入れておく。
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        id: release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # リリースが作成されたときだけ、各プラットフォームのバイナリをビルドして Release 資産に添付する。
  # GITHUB_TOKEN で作成した Release はワークフローを連鎖起動しないため、同一ワークフロー内の
  # job 依存（needs / if）でビルドを繋ぐ。
  build:
    name: Build ${{ matrix.target }}
    needs: release-plz
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (release)
        run: cargo build --release --target ${{ matrix.target }}

      # macOS バイナリを Developer ID で署名し公証する（Gatekeeper 警告の回避）。
      - name: Import Developer ID certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          keychain="$RUNNER_TEMP/signing.keychain-db"
          keychain_pw="$(openssl rand -base64 24)"
          cert="$RUNNER_TEMP/cert.p12"
          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$cert"
          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"
          security import "$cert" -k "$keychain" -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_pw" "$keychain"
          # codesign が新しいキーチェーンを参照できるよう検索リストへ追加する。
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | sed 's/"//g')
          rm -f "$cert"

      - name: Sign binary (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
        run: |
          bin="target/${{ matrix.target }}/release/fv"
          codesign --force --timestamp --options runtime --sign "$MACOS_SIGN_IDENTITY" "$bin"
          codesign --verify --strict --verbose=2 "$bin"

      - name: Notarize binary (macOS)
        if: runner.os == 'macOS'
        env:
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          bin="target/${{ matrix.target }}/release/fv"
          key="$RUNNER_TEMP/AuthKey.p8"
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$key"
          # 素のバイナリを zip にして提出する。
          ditto -c -k "$bin" "$RUNNER_TEMP/fv-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/fv-notarize.zip" \
            --key "$key" --key-id "$AC_API_KEY_ID" --issuer "$AC_API_ISSUER_ID" \
            --wait
          rm -f "$key"
          # 素の実行ファイルは stapler 非対応のため staple はしない（公証チケットはオンライン照合される）。

      # 単一クレートのため release-plz のタグは v<version> 形式。
      # Cargo.toml のバージョン（= バイナリに埋め込まれた版）からタグを導出する。
      # Homebrew の bin.install が素直に扱えるよう、中身を `fv` とした tar.gz で配布する。
      - name: Package and upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          cp "target/${{ matrix.target }}/release/fv" fv
          tar -czf "fv-${{ matrix.target }}.tar.gz" fv
          gh release upload "v${version}" "fv-${{ matrix.target }}.tar.gz" --clobber

  # Homebrew tap (pkshimizu/homebrew-tap) の fv.rb を、今回のリリースのバージョンと
  # 各 tar.gz の sha256 で更新する。別リポジトリへ push するため fine-grained PAT を使う。
  update-homebrew:
    name: Update Homebrew formula
    needs: [release-plz, build]
    if: needs.release-plz.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets and render formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          tag="v${version}"
          darwin_asset="fv-aarch64-apple-darwin.tar.gz"
          linux_asset="fv-x86_64-unknown-linux-gnu.tar.gz"

          gh release download "$tag" --repo "${GITHUB_REPOSITORY}" \
            --pattern "$darwin_asset" --pattern "$linux_asset" --dir dist

          darwin_sha=$(sha256sum "dist/${darwin_asset}" | cut -d' ' -f1)
          linux_sha=$(sha256sum "dist/${linux_asset}" | cut -d' ' -f1)

          sed -e "s|__VERSION__|${version}|g" \
              -e "s|__SHA256_DARWIN_ARM64__|${darwin_sha}|g" \
              -e "s|__SHA256_LINUX_X86_64__|${linux_sha}|g" \
              .github/homebrew/fv.rb.tmpl > fv.rb

      - name: Push formula to homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/pkshimizu/homebrew-tap.git" tap
          cp fv.rb tap/fv.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # 先に stage してから差分判定する。git diff（作業ツリー）は未追跡ファイルを
          # 検知しないため、初回の新規 fv.rb が push されない不具合を避ける。
          git add fv.rb
          if git diff --cached --quiet; then
            echo "fv.rb に変更なし。push をスキップします。"
            exit 0
          fi
          git commit -m "fv ${version}"
          git push

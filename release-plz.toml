# release-plz の設定。
# main への push 時に「リリース PR」（Cargo.toml のバージョン bump + CHANGELOG 生成）を
# 自動作成・更新し、その PR をマージするとタグ + GitHub Release を作成する。
[workspace]
# crates.io への publish（cargo publish）を行う。
# 認証は release.yml の release-plz ステップに渡す CARGO_REGISTRY_TOKEN を使う
# （未設定だと publish が失敗するため、Secrets への登録が前提）。
# 注意: 公開可否は Cargo.toml の [package] publish ではなくこちらで制御する。
# Cargo.toml 側で false にするとパッケージ自体が release-plz の処理対象外になり、
# リリース PR もリリースも作られなくなる。
publish = true
# git タグからバージョンを判定する（cargo レジストリを参照しない）。
# これが無いと、未公開パッケージでは初回リリース後に「最後のリリース版」を
# レジストリから取得できず、コミットからの bump を計算できないため
# 2 回目以降のリリース PR が作成されない。
git_only = true
# リリースの起点はリリース PR のマージ。push のたびに自動リリースしない。
release_always = false
# GitHub Release を作成する。
git_release_enable = true
# CHANGELOG.md を生成・更新する。
changelog_update = true
